<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oliver's market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside>
        <div id="BarraSuperior">
        <ul>
            <li>
                <div id="titulo">
                <img src="img/carrinho.png" alt="">
                <h1>Oliver's Market</h1>
            </div>
            </li>
            <li class="menu-item menu-direita">
                <img src="img/casa.png" alt="">
                <span>Home</span>
            </li>
            <li class="menu-item">
                <img src="img/checklist.png" alt="">
                <span>produtos</span>
            </li>
            <li class="menu-item">
                <img src="img/assistencia.png" alt="">
                <span>assistencia</span>
            </li>
            <li class="menu-item">
                <img src="img/pesquisa.png" alt="">
                <span>pesquisa</span>
            </li>                                            
            </div>
        </ul>
        </div>
        <div id="BarraPrincipal">
            <p>Coloque o código do produto:</p>
            <input id="códigoDoproduto" type="text"> 
            <input id="QTDDoproduto" type="text">
            <button id="BNTadcionar">Adicionar</button>
            <div id="asDuasBarras">
                <div class="area-produtos">

            <div class="scroll-tabela">
                <table id="Table1">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>QTD</th>
                            <th>Preço</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="tabela">             
                    </tbody>
                </table>
            </div>
        </div>
            <div>
                <table id="Table2" class="Direita">
                <thead>
                    <tr>
                        <th colspan="2">resumo de vendas</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Total:</td>
                        <td>R$0</td>
                    </tr>
                    <tr>
                        <td>Pago:</td>
                        <td>R$0</td>
                    </tr>
                    <tr>
                        <td>Desconto:</td>
                        <td>R$0</td>
                    </tr>
                </tbody>
            </table>
            <button id="BTNcompletarCompra">
                Completar a compra
            </button>
        </div>
    </div>
    <div id="BarraInferior">
        <ul>
            <li class="menu-item">
                <img src="img/check.png" alt="">
                <span>Completar pedido</span>
            </li>
            <li class="menu-item">
                <img src="img/Errado.png" alt="">
                <span>Cancelar pedido</span>
            </li>
            <li class="menu-item">
                <img src="img/Carta.png" alt="">
                <span>Remover item</span>
            </li>
            <li class="menu-item">
                <img src="img/Moeda.png" alt="">
                <span>Checar o preço</span>
            </li>
            <li class="menu-item">
                <img src="img/Porquinho.png" alt="">
                <span>Desconto</span>
            </li>
            <li class="menu-item">
                <img src="img/simbulo administrativo.png" alt="">
                <span>Admin</span>
            </li>
        </ul>
    </div>         
    </div>
    </aside>
    <script src="scripts.js"></script>
</body>
</html>
